<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>Principal Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<script src="https://cdn.jsdelivr.net/npm/chart.js"></script>

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

/* hover */
.card-hover:hover {
  box-shadow: 0 0 25px rgba(0,255,255,0.2);
  transform: translateY(-5px);
}

/* animation */
.fade-in {
  animation: fadeIn 0.6s ease-in-out;
}
@keyframes fadeIn {
  from { opacity: 0; transform: translateY(15px);}
  to { opacity: 1; transform: translateY(0);}
}
</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-indigo-900 to-slate-800 text-white min-h-screen">


<!-- 🔷 HEADER -->
<header class="bg-white/10 backdrop-blur-xl border-b border-white/20 shadow-lg flex justify-between items-center px-6 py-4">

<h1 class="text-xl font-semibold text-cyan-400">
Principal Dashboard
</h1>

<button onclick="logout()"
class="bg-gradient-to-r from-red-500 to-pink-500 px-4 py-2 rounded-lg hover:scale-105 transition">
Logout
</button>

</header>

<!-- 🔷 MAIN -->
<div class="p-6 space-y-8 fade-in">

<!-- 🔥 TOP BAR -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">
  
  <h2 id="principalName" class="text-2xl font-bold"></h2>

  <!-- QUICK INFO -->
  <div class="flex gap-3">
    <div class="bg-white/10 px-4 py-2 rounded-lg text-sm">🏫 Total Students</div>
    <div class="bg-white/10 px-4 py-2 rounded-lg text-sm">📊 Departments</div>
  </div>

</div>

<!-- 🔥 STATS -->
<div id="statsContainer">
</div>

<!-- 🔥 MAIN GRID -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- LEFT SIDE -->
  <div class="lg:col-span-2 space-y-6">

    <!-- DEPARTMENT -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-xl shadow card-hover">
      <h3 class="font-semibold mb-4 text-gray-300">Department Overview</h3>
      <div id="deptContainer"></div>
    </div>

    <!-- TOP STUDENTS -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-xl shadow card-hover">
      <h3 class="font-semibold mb-4 text-gray-300">Top Students</h3>
      <div id="topStudentsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

  </div>

  <!-- RIGHT SIDE -->
  <div class="space-y-6">

    <!-- SEARCH -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-xl shadow card-hover">
      <h3 class="font-semibold mb-3 text-gray-300">Search Students</h3>
      <div id="searchContainer"></div>
    </div>

    <!-- ALERTS -->
    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-xl shadow card-hover">
      <h3 class="font-semibold mb-3 text-gray-300">Alerts & Notices</h3>
      <div id="alertsContainer" class="space-y-3"></div>
    </div>

  </div>

</div>

</div>

<script type="module" src="./principal.js"></script>
<script>
function scrollToSection(id) {
  document.getElementById(id).scrollIntoView({
    behavior: "smooth"
  });
}
</script>

</body>
</html>
