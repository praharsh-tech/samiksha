<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<title>HOD Dashboard</title>
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<script src="https://cdn.tailwindcss.com"></script>
<link rel="icon" href="data:,">

<link href="https://fonts.googleapis.com/css2?family=Poppins:wght@300;400;600;700&display=swap" rel="stylesheet">

<style>
body {
  font-family: 'Poppins', sans-serif;
}

/* hover */
.card-hover:hover {
  transform: translateY(-4px);
  box-shadow: 0 10px 30px rgba(0,0,0,0.4);
  transition: 0.3s;
}
</style>

</head>

<body class="bg-gradient-to-br from-slate-900 via-cyan-900 to-slate-800 text-white min-h-screen overflow-x-hidden">

<!-- HEADER -->
<header class="bg-white/10 backdrop-blur-xl border-b border-white/20 shadow-lg flex justify-between items-center px-6 py-4">

<h1 class="text-xl font-semibold text-cyan-400">
HOD Dashboard
</h1>

<button id="logoutBtn"
class="bg-gradient-to-r from-red-500 to-pink-500 px-4 py-2 rounded-lg hover:scale-105 transition">
Logout
</button>

</header>

<!-- MAIN -->
<div class="p-6 space-y-8">

<!-- TOP INFO -->
<div class="flex flex-col md:flex-row md:justify-between md:items-center gap-4">

  <div>
    <h2 id="hodName" class="text-2xl font-bold"></h2>
    <p id="hodDept" class="text-gray-300"></p>
  </div>

  <div class="flex gap-3">
    <div class="bg-white/10 px-4 py-2 rounded-lg text-sm backdrop-blur-xl">
      👨‍🎓 Students
    </div>
    <div class="bg-white/10 px-4 py-2 rounded-lg text-sm backdrop-blur-xl">
      📊 Performance
    </div>
  </div>

</div>

<!-- STATS -->
<div id="statsContainer" ></div>

<!-- MAIN GRID -->
<div class="grid grid-cols-1 lg:grid-cols-3 gap-6">

  <!-- LEFT -->
  <div class="lg:col-span-2 space-y-6">

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-2xl shadow card-hover">
      <h3 class="font-semibold mb-4 text-gray-300">Department Overview</h3>
      <div id="deptContainer"></div>
    </div>

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-2xl shadow card-hover">
      <h3 class="font-semibold mb-4 text-gray-300">Top Students</h3>
      <div id="topStudentsContainer" class="grid grid-cols-1 md:grid-cols-2 gap-4"></div>
    </div>

  </div>

  <!-- RIGHT -->
  <div class="space-y-6">

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-2xl shadow card-hover">
      <h3 class="font-semibold mb-3 text-gray-300">Search Students</h3>
      <div id="searchContainer"></div>
    </div>

    <div class="bg-white/10 backdrop-blur-xl border border-white/20 p-5 rounded-2xl shadow card-hover">
      <h3 class="font-semibold mb-3 text-gray-300">Alerts</h3>
      <div id="alertsContainer"></div>
    </div>

  </div>

</div>

</div>

<script type="module" src="../HOD/hod.js"></script>

</body>
</html>
