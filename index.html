<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <title>Student Login | College Portal</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />

  <!-- Tailwind CSS -->
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gradient-to-br from-blue-100 to-indigo-200 min-h-screen">

  <!-- ✅ NAVBAR -->
  <header class="bg-white shadow">
    <nav class="py-4 px-8 flex justify-between items-center">
      <div class="flex items-center gap-3">
        <img src="./Logo-Poly-NIT--1024x248.jpg" class="h-12 object-contain" />
        <div>
          <h1 class="text-xl font-semibold text-blue-700">
            NIT Polytechnic, Nagpur
          </h1>
          <p class="text-sm text-gray-600">
            Accredited | Approved by AICTE
          </p>
        </div>
      </div>

      <ul class="flex gap-8 font-medium text-gray-700 max-sm:hidden">
        <li class="hover:text-blue-600 cursor-pointer">Home</li>
        <li class="hover:text-blue-600 cursor-pointer">About</li>
        <li class="hover:text-blue-600 cursor-pointer">Departments</li>
        <li class="hover:text-blue-600 cursor-pointer">Contact</li>
      </ul>
    </nav>
  </header>

  <!-- ✅ MAIN CONTENT -->
  <main class="flex items-center justify-center min-h-[calc(100vh-96px)] px-4">

    <div class="bg-white shadow-xl rounded-2xl w-full max-w-md p-8">

      <!-- Portal Title -->
      <div class="text-center mb-6">
        <h2 class="text-2xl font-bold text-indigo-700">
          College Student Portal
        </h2>
        <p class="text-sm text-gray-500">Student Login</p>
      </div>

      <!-- Login Form -->
      <form id="loginForm" class="space-y-5">

        <div>
          <label class="block text-sm font-medium text-gray-700">
            PRN / Enrollment No
          </label>
          <input
            type="text"
            id="prn"
            placeholder="Enter PRN"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
            required
          />
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700">
            Password
          </label>
          <input
            type="password"
            id="password"
            placeholder="Enter Password"
            class="w-full mt-1 px-4 py-2 border rounded-lg focus:ring-2 focus:ring-indigo-400 outline-none"
            required
          />
        </div>

        <button
          type="submit"
          class="w-full bg-indigo-600 hover:bg-indigo-700 text-white font-semibold py-2 rounded-lg transition">
          Login
        </button>

      </form>

      <!-- Error Message -->
      <p
        id="errorMsg"
        class="text-center text-red-500 text-sm mt-4 hidden">
        Invalid PRN or Password
      </p>

    </div>
  </main>

  <!-- JS -->
  <script type="module" src="./login.js"></script>
</body>
</html>
